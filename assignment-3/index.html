<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimpleStorage DApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 { color: #7b5ea7; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2e2e4e;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; color: #a98fd5; margin-bottom: 16px; }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .info-row span:first-child { color: #888; }
    .info-row span:last-child { color: #e0e0e0; word-break: break-all; text-align: right; max-width: 60%; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #connectBtn { background: #7b5ea7; color: #fff; }
    #setBtn { background: #4a90d9; color: #fff; }
    #getBtn { background: #2e8b57; color: #fff; }
    .status {
      font-size: 13px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      background: #0f0f1a;
      border: 1px solid #2e2e4e;
      min-height: 38px;
      color: #a8d8a8;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>🔗 SimpleStorage DApp</h1>
  <p class="subtitle">Blockchain Technology – Assignment 3</p>

  <!-- Wallet Info Card -->
  <div class="card">
    <h2>🦊 Wallet Connection</h2>
    <div class="info-row">
      <span>Status</span>
      <span id="walletStatus">Not Connected</span>
    </div>
    <div class="info-row">
      <span>Account</span>
      <span id="walletAccount">—</span>
    </div>
    <div class="info-row">
      <span>Network</span>
      <span id="walletNetwork">—</span>
    </div>
    <button id="connectBtn" onclick="connectWallet()">Connect MetaMask</button>
  </div>

  <!-- Contract Interaction Card -->
  <div class="card">
    <h2>📦 Contract Interaction</h2>
    <div class="info-row">
      <span>Contract Address</span>
      <span id="contractAddr">0xYourContractAddress</span>
    </div>

    <input type="number" id="valueInput" placeholder="Enter a number to store..." min="0" />
    <button id="setBtn" onclick="setValue()">Set Value</button>
    <button id="getBtn" onclick="getValue()">Get Value</button>

    <div class="status" id="statusBox">Waiting for action...</div>
  </div>

  <!-- Web3 / Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    const CONTRACT_ADDRESS = "0xYourDeployedContractAddressHere";
    const ABI = [
      "function setValue(uint256 _value) public",
      "function getValue() public view returns (uint256)",
      "function getOwner() public view returns (address)"
    ];
    // ────────────────────────────────────────────────────────────────────────

    let provider, signer, contract;

    async function connectWallet() {
      if (typeof window.ethereum === "undefined") {
        alert("MetaMask not detected! Please install MetaMask.");
        return;
      }
      try {
        await window.ethereum.request({ method: "eth_requestAccounts" });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

        const account = await signer.getAddress();
        const network = await provider.getNetwork();

        document.getElementById("walletStatus").textContent = "✅ Connected";
        document.getElementById("walletAccount").textContent = account;
        document.getElementById("walletNetwork").textContent = `${network.name} (Chain: ${network.chainId})`;
        document.getElementById("statusBox").textContent = "Wallet connected. Ready to interact!";
      } catch (err) {
        document.getElementById("statusBox").textContent = "Connection failed: " + err.message;
      }
    }

    async function setValue() {
      if (!contract) { alert("Connect wallet first!"); return; }
      const val = document.getElementById("valueInput").value;
      if (val === "") { alert("Enter a value!"); return; }
      try {
        document.getElementById("statusBox").textContent = "Sending transaction...";
        const tx = await contract.setValue(parseInt(val));
        document.getElementById("statusBox").textContent = `Tx sent: ${tx.hash} — waiting for confirmation...`;
        await tx.wait();
        document.getElementById("statusBox").textContent = `✅ Value set to ${val}! Tx: ${tx.hash}`;
      } catch (err) {
        document.getElementById("statusBox").textContent = "Error: " + err.message;
      }
    }

    async function getValue() {
      if (!contract) { alert("Connect wallet first!"); return; }
      try {
        const val = await contract.getValue();
        document.getElementById("statusBox").textContent = `📦 Current stored value: ${val.toString()}`;
      } catch (err) {
        document.getElementById("statusBox").textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
